<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Shopping App</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
html { scroll-behavior: smooth; }

/* Cart animation */
.cart-overlay {
    transition: opacity 0.3s ease-in-out, visibility 0.3s;
}
.cart-sidebar {
    transition: transform 0.3s ease;
}
.cart-open .cart-overlay { opacity: 1; visibility: visible; }
.cart-open .cart-sidebar { transform: translateX(0); }
.cart-closed .cart-overlay { opacity: 0; visibility: hidden; }
.cart-closed .cart-sidebar { transform: translateX(100%); }
</style>
</head>

<body class="bg-gray-50 text-gray-800 cart-closed" id="app-body">

<!-- NAVBAR -->
<nav class="bg-white shadow p-4 flex justify-between">
    <h1 class="text-xl font-bold text-blue-600">ShopEasy</h1>

    <button onclick="toggleCart()" class="relative">
        🛒
        <span id="cart-badge" class="absolute -top-2 -right-2 bg-blue-600 text-white text-xs px-2 rounded-full">0</span>
    </button>
</nav>

<!-- PRODUCTS -->
<main class="p-6">
    <h2 class="text-2xl font-bold mb-6 text-center">Products</h2>
    <div id="product-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
</main>

<!-- CART -->
<div id="cart-overlay" class="fixed inset-0 cart-overlay pointer-events-none">
    <div class="absolute inset-0 bg-black bg-opacity-50" onclick="toggleCart()"></div>

    <div class="absolute right-0 top-0 h-full w-80 bg-white cart-sidebar transform translate-x-full p-4">
        <h2 class="text-xl font-bold mb-4">Cart</h2>
        <div id="cart-items"></div>

        <p class="mt-4 font-bold">Total: $<span id="total">0</span></p>

        <button onclick="checkout()" class="bg-blue-600 text-white px-4 py-2 mt-4 w-full">
            Checkout
        </button>
    </div>
</div>

<script>
// PRODUCTS
const products = [
    { id: 1, name: "Headphones", price: 100 },
    { id: 2, name: "Watch", price: 50 },
    { id: 3, name: "Shoes", price: 80 }
];

// STATE
let cart = [];

// INIT
function init() {
    renderProducts();
    updateCart();
}

// RENDER PRODUCTS
function renderProducts() {
    const grid = document.getElementById("product-grid");

    grid.innerHTML = products.map(p => `
        <div class="bg-white p-4 shadow rounded">
            <h3 class="font-bold">${p.name}</h3>
            <p>$${p.price}</p>
            <button onclick="addToCart(${p.id})" 
                class="bg-blue-600 text-white px-3 py-1 mt-2">
                Add to Cart
            </button>
        </div>
    `).join("");
}

// ADD TO CART
function addToCart(id) {
    const item = cart.find(i => i.id === id);

    if (item) item.qty++;
    else cart.push({ id, qty: 1 });

    updateCart();
}

// UPDATE CART
function updateCart() {
    const container = document.getElementById("cart-items");
    const badge = document.getElementById("cart-badge");

    let total = 0;

    container.innerHTML = cart.map(item => {
        const product = products.find(p => p.id === item.id);
        total += product.price * item.qty;

        return `
            <div class="flex justify-between mb-2">
                <span>${product.name} x${item.qty}</span>
                <span>$${product.price * item.qty}</span>
            </div>
        `;
    }).join("");

    document.getElementById("total").textContent = total;
    badge.textContent = cart.reduce((a, b) => a + b.qty, 0);
}

// TOGGLE CART
function toggleCart() {
    const body = document.getElementById("app-body");

    body.classList.toggle("cart-open");
    body.classList.toggle("cart-closed");
}

// CHECKOUT
function checkout() {
    if (cart.length === 0) {
        alert("Cart is empty!");
        return;
    }

    alert("Order placed successfully!");
    cart = [];
    updateCart();
}

// START
init();
</script>

</body>
</html>
